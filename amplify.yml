version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --cache .npm --prefer-offline --legacy-peer-deps --no-audit --no-fund
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
    appRoot: frontend
